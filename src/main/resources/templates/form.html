<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-primary mb-4">📦 Thêm / Cập nhật sản phẩm</h3>

        <form th:action="@{/products/save}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}"/>

            <!-- TÊN -->
            <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}">
                </div>
            </div>

            <!-- GIÁ -->
            <div class="mb-3">
                <label class="form-label">Giá</label>
                <input type="number" th:field="*{price}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('price')}"
                     th:errors="*{price}">
                </div>
            </div>

            <!-- LOẠI -->
            <div class="mb-3">
                <label class="form-label">Loại</label>
                <select th:field="*{category}"
                        class="form-select"
                        th:classappend="${#fields.hasErrors('category')} ? 'is-invalid' : ''">
                    <option value="">-- Chọn loại --</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Điện thoại">Điện thoại</option>
                </select>
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('category')}"
                     th:errors="*{category}">
                </div>
            </div>

            <!-- HÌNH -->
            <div class="mb-3">
                <label class="form-label">Hình ảnh</label>
                <input type="file" name="file" class="form-control">
            </div>

            <!-- BUTTON -->
            <div class="d-flex justify-content-between">
                <a th:href="@{/products}" class="btn btn-secondary">
                    ⬅ Quay lại
                </a>

                <button type="submit" class="btn btn-success">
                    💾 Lưu
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
