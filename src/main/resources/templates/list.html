<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .table img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-primary">📦 Quản lý sản phẩm</h3>
            <a th:href="@{/products/add}" class="btn btn-success">
                ➕ Thêm mới
            </a>
        </div>

        <table class="table table-bordered table-hover align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Hình</th>
                <th>Loại</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td class="text-danger fw-bold"
                    th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                </td>
                <td>
                    <img th:src="@{'/uploads/' + ${p.image}}" alt="image">
                </td>
                <td th:text="${p.category}"></td>
                <td>
                    <a th:href="@{'/products/edit/' + ${p.id}}"
                       class="btn btn-warning btn-sm">✏ Sửa</a>
                    <a th:href="@{'/products/delete/' + ${p.id}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xoá?')">
                        🗑 Xoá
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
